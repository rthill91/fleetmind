<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">FleetMind logo</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A logo showing a stylized eye inside a hexagonal snap boundary, with a terminal prompt symbol as the iris, above the FleetMind wordmark</desc>
  <defs>
    
  </defs>

  <!-- Hexagonal snap boundary (flat-top) -->
  <!-- Center: 340, 112. Radius: 82 -->
  <polygon points="340,30 411,71 411,153 340,194 269,153 269,71" fill="none" stroke-width="1.5" style="fill:none;stroke:rgb(5, 150, 105);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Outer dashed hex, slightly larger, representing confinement -->
  <polygon points="340,16 425,63 425,157 340,204 255,157 255,63" fill="none" stroke-width="0.75" stroke-dasharray="5 4" opacity="0.5" style="fill:none;stroke:rgb(5, 150, 105);color:rgb(0, 0, 0);stroke-width:0.75px;stroke-dasharray:5px, 4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Eye shape inside hex (horizontal almond) centered at 340,112 -->
  <path d="M280,112 C295,82 385,82 400,112 C385,142 295,142 280,112 Z" fill="none" stroke-width="2" style="fill:none;stroke:rgb(5, 150, 105);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Iris circle -->
  <circle cx="340" cy="112" r="22" fill="none" stroke-width="1.5" style="fill:none;stroke:rgb(5, 150, 105);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Pupil -->
  <circle cx="340" cy="112" r="10" style="fill:rgb(5, 150, 105);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Terminal prompt symbol inside pupil: ">" in white/bg -->
  <text x="340" y="117" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="var(--color-background-primary)" style="fill:rgb(5, 150, 105);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:12px;font-weight:700;text-anchor:middle;dominant-baseline:auto">&gt;_</text>

  <!-- Subtle observation rays from iris outward (read-only signals) -->
  <line x1="340" y1="86" x2="340" y2="74" stroke-width="1" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(5, 150, 105);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="363" y1="92" x2="372" y2="83" stroke-width="1" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(5, 150, 105);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="317" y1="92" x2="308" y2="83" stroke-width="1" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(5, 150, 105);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="340" y1="138" x2="340" y2="150" stroke-width="1" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(5, 150, 105);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="363" y1="132" x2="372" y2="141" stroke-width="1" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(5, 150, 105);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="317" y1="132" x2="308" y2="141" stroke-width="1" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(5, 150, 105);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Small lock icon hint — bottom of hex to suggest confinement -->
  <rect x="333" y="196" width="14" height="11" rx="2" fill="none" stroke-width="1.2" style="fill:none;stroke:rgb(5, 150, 105);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M336,196 v-4 a4,4 0 0 1 8,0 v4" fill="none" stroke-width="1.2" style="fill:none;stroke:rgb(5, 150, 105);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Wordmark -->
  <text x="340" y="264" text-anchor="middle" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:52px;font-weight:500;text-anchor:middle;dominant-baseline:auto">
    <tspan style="fill:rgb(17, 24, 39);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:52px;font-weight:500;text-anchor:middle;dominant-baseline:auto">fleet</tspan><tspan style="fill:rgb(5, 150, 105);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:52px;font-weight:500;text-anchor:middle;dominant-baseline:auto">mind</tspan>
  </text>

  <!-- Tagline -->
  <text x="340" y="289" text-anchor="middle" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">MCP SERVER · READ-ONLY · SNAP CONFINED</text>
</svg>